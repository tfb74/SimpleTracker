name: SimpleTracking
options:
  bundleIdPrefix: com.felix
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"

schemes:
  SimpleTracking:
    build:
      targets:
        SimpleTracking: all
    run:
      config: Debug
      simulatorName: "iPhone 17"
      askForAppToLaunch: false
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  SimpleTracking:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SimpleTracking
      - path: Shared
    dependencies:
      - package: GoogleMobileAds
    info:
      path: SimpleTracking/App/Info.plist
      properties:
        CFBundleDisplayName: SimpleTracking
        NSHealthShareUsageDescription: "SimpleTracking liest Gesundheitsdaten für Workout-Auswertungen."
        NSHealthUpdateUsageDescription: "SimpleTracking speichert Workouts in Apple Health."
        NSLocationWhenInUseUsageDescription: "GPS-Tracking deiner Route während des Workouts."
        NSLocationAlwaysAndWhenInUseUsageDescription: "GPS-Tracking auch wenn die App im Hintergrund läuft."
        NSCameraUsageDescription: "Kamera wird für Barcode-Scan und Foto-Analyse von Essen/Getränken genutzt."
        NSPhotoLibraryUsageDescription: "Auswahl von Food-Fotos zur Nährwert-Analyse."
        NSUserTrackingUsageDescription: "Deine Zustimmung ermöglicht dezente, auf dich abgestimmte Werbung in der Statistik."
        # Echte AdMob-App-ID (SimpleTracking iOS).
        # Im Debug-Build nutzt AdService automatisch Google's Test-Ad-Unit-ID.
        GADApplicationIdentifier: "ca-app-pub-9685354539860584~2584848655"
